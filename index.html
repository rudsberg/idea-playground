<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Playground</title>
<style>
  :root{color-scheme:light dark}
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0b1020;color:#f4f6fb;padding:24px;
  }
  .wrap{width:100%;max-width:520px}
  h1{font-size:1.6rem;margin-bottom:4px}
  p.sub{color:#8b93ad;margin-bottom:28px}
  a.card{
    display:block;text-decoration:none;color:inherit;
    background:#151b30;border:1px solid #252e49;border-radius:16px;
    padding:20px 22px;transition:border-color .15s,transform .15s;
  }
  a.card:hover{border-color:#a78bfa;transform:translateY(-2px)}
  a.card h2{font-size:1.15rem;margin-bottom:6px}
  a.card span{color:#8b93ad;font-size:.95rem}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Idea Playground</h1>
    <p class="sub">A place for small experiments and apps.</p>
    <a class="card" href="run-rehab/">
      <h2>🏃 Rehab Run Trainer</h2>
      <span>Run/walk interval trainer with live GPS pace zones.</span>
    </a>
  </div>
</body>
</html>
